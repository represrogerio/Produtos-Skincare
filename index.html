<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skincare Estoque Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --primary:#6366f1; --green:#10b981; --red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;min-height:100vh}
.sidebar{width:280px;background:#0f172a;color:#fff;padding:24px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{font-size:22px;font-weight:800;margin-bottom:32px}
.nav-btn{all:unset;cursor:pointer;padding:12px 16px;border-radius:10px;color:#94a3b8;font-weight:500;display:flex;gap:10px;align-items:center}
.nav-btn.active,.nav-btn:hover{background:#1e293b;color:#fff}
.main{flex:1}
.topbar{position:sticky;top:0;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.cotacao-badge{background:linear-gradient(90deg,#10b981,#059669);color:white;padding:8px 14px;border-radius:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.content{padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.btn{padding:12px 18px;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin:5px}
.btn-danger{background:#ef4444;color:white}
.btn-success{background:#10b981;color:white}
.btn-primary{background:#6366f1;color:white}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">🧴 Skincare Pro</div>
  <button class="nav-btn active" onclick="showPage('dashboard')">📊 Dashboard</button>
  <button class="nav-btn" onclick="showPage('produtos')">🧴 Produtos</button>
  <button class="nav-btn" onclick="showPage('compras')">🛒 Compras</button>
</aside>
<main class="main">
  <header class="topbar">
    <h1 id="pageTitle">Dashboard</h1>
    <div class="cotacao-badge" id="cotacao-badge">💵 USD: Carregando...</div>
  </header>
  <div class="content">

    <div id="dashboard" class="page">
      <h2>Integração com Mercado Livre</h2>
      <div class="card">
        <p><strong>Passo 1:</strong> Limpe os produtos antigos e crie os 20 produtos com vínculo correto</p>
        <button class="btn btn-danger" onclick="limparTodosProdutos()">
          🗑️ Limpar todos os produtos
        </button>
        <button class="btn btn-success" onclick="criarProdutosML()">
          📦 Criar 20 Produtos com ML IDs
        </button>
      </div>
      <div class="card">
        <p><strong>Passo 2:</strong> Conecte sua conta do Mercado Livre para o estoque baixar automaticamente</p>
        <a href="/api/auth/login" class="btn btn-primary">🔗 Conectar Mercado Livre</a>
      </div>
    </div>

    <div id="produtos" class="page hidden">
      <div class="card">
        <h3>Novo Produto</h3>
        <!-- Seu formulário original mantido -->
        <div class="form-grid">
          <input id="nomeProduto" class="input" placeholder="Nome">
          <input id="skuProduto" class="input" placeholder="SKU">
          <input id="mlIdProduto" class="input" placeholder="ID ML (MLB...)">
          <input id="estoqueProduto" type="number" class="input" placeholder="Estoque">
        </div>
        <button class="btn btn-primary" onclick="salvarProduto()">Salvar Produto</button>
      </div>
      <!-- Lista de produtos mantida (seu código anterior) -->
    </div>

    <div id="compras" class="page hidden">
      <!-- Seu código de compras anterior -->
    </div>

  </div>
</main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBX6_4pbYSgyT9JDvyqLgfk63yyUbF8AcE",
  authDomain: "skincare-estoque.firebaseapp.com",
  projectId: "skincare-estoque",
  storageBucket: "skincare-estoque.firebasestorage.app",
  messagingSenderId: "853012503411",
  appId: "1:853012503411:web:38a3b7ee12115cc4518306"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const produtosML = [ /* sua lista completa com 20 produtos */ ];

window.limparTodosProdutos = async function() {
  if (!confirm("⚠️ TEM CERTEZA? Isso vai APAGAR TODOS os produtos do Firebase!")) return;
  if (!confirm("Digite 'LIMPAR' para confirmar:")) return;
  
  const snap = await getDocs(collection(db, "produtos"));
  for (let d of snap.docs) await deleteDoc(d.ref);
  alert("✅ Todos os produtos foram apagados!");
};

window.criarProdutosML = async function() {
  if (!confirm("Vai criar os 20 produtos com SKU e ml_item_id. Continuar?")) return;
  
  let count = 0;
  for (let p of produtosML) {
    await addDoc(collection(db, "produtos"), {
      nome: p.nome,
      sku: p.sku,
      ml_item_id: p.ml_item_id,
      estoque: p.estoque || 0,
      minimo: p.minimo || 3,
      ultimaUSD: 0,
      ultimaBRL: 0,
      criadoEm: Date.now()
    });
    count++;
  }
  alert(`✅ ${count} produtos criados com sucesso! Agora clique em "Conectar Mercado Livre".`);
};

async function atualizarCotacao() {
  try {
    const r = await fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL");
    const d = await r.json();
    document.getElementById("cotacao-badge").innerText = `💵 USD → R$ ${parseFloat(d.USDBRL.bid).toFixed(2)}`;
  } catch(e) {}
}
atualizarCotacao();
setInterval(atualizarCotacao, 60000);

window.showPage = function(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
};
</script>
</body>
</html>
