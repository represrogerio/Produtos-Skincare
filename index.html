<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skincare Estoque Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc; 
  --card:#fff; 
  --text:#0f172a; 
  --muted:#64748b;
  --border:#e2e8f0; 
  --primary:#6366f1;
  --green:#10b981; 
  --red:#ef4444; 
  --radius:14px;
}

*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none!important}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:#0f172a;color:#fff;padding:24px 16px;display:flex;flex-direction:column}
.brand{font-size:18px;font-weight:800;margin-bottom:30px}
.nav-btn{all:unset;cursor:pointer;padding:10px 14px;border-radius:8px;color:#94a3b8;font-size:14px;margin-bottom:6px}
.nav-btn.active,.nav-btn:hover{background:#1e293b;color:#fff}
.main{flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.content{padding:24px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--border);padding:16px;border-radius:var(--radius)}
.stat h4{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.stat strong{font-size:22px}

/* Buttons */
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-edit{background:#e0e7ff;color:#3730a3}
.btn:hover{opacity:.9}

/* Table */
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
th{font-size:12px;text-transform:uppercase;color:var(--muted);padding:10px;border-bottom:1px solid var(--border);text-align:left}
td{padding:10px;border-top:1px solid var(--border);font-size:13px}
.img-thumb{width:42px;height:42px;border-radius:8px;object-fit:cover}

/* Alerts */
.alert-low{background:#fee2e2;color:#991b1c;padding:10px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:8px}

/* Tooltip */
.tooltip{position:fixed;display:none;z-index:9999;background:#fff;border:1px solid var(--border);padding:6px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.2)}

.input{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:13px}

</style>
</head>

<body>
<div class="app">
<aside class="sidebar">
<div class="brand">🧴 Skincare Pro</div>
<button id="nav-dashboard" class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
<button id="nav-produtos" class="nav-btn" onclick="showPage('produtos')">Produtos</button>
<button id="nav-compras" class="nav-btn" onclick="showPage('compras')">Compras</button>
<div style="margin-top:auto;font-size:12px;color:#94a3b8">
<span id="dollar-info">USD carregando...</span>
</div>
</aside>

<main class="main">
<header class="topbar">
<h2 id="pageTitle">Dashboard</h2>
<input id="searchProdutos" class="input" style="max-width:240px" placeholder="Buscar produto">
</header>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="stats">
<div class="stat"><h4>Total Produtos</h4><strong id="totalProdutos">0</strong></div>
<div class="stat"><h4>Total Estoque</h4><strong id="totalEstoque">0</strong></div>
<div class="stat"><h4>Estoque Baixo</h4><strong id="totalBaixo">0</strong></div>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
<h3>Alertas</h3>
<button id="btnImportar" class="btn btn-primary" onclick="importarGitHub()">Importar GitHub</button>
</div>
<div id="alerts" style="margin-top:10px"></div>
</div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="page hidden">
<div class="card">
<h3>Novo Produto</h3>
<input id="nomeProduto" class="input" placeholder="Nome">
<input id="estoqueProduto" type="number" class="input" placeholder="Estoque inicial">
<input id="minimoProduto" type="number" class="input" placeholder="Estoque mínimo">
<input id="fotoProduto" type="file" class="input" accept="image/*">
<button class="btn btn-primary" onclick="salvarProduto()">Salvar</button>
</div>

<div class="card">
<h3>Lista</h3>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nome</th>
<th>Estoque</th>
<th>Mín</th>
<th>USD</th>
<th>R$</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>
</div>
</div>
</div>

<!-- COMPRAS -->
<div id="compras" class="page hidden">
<div class="card">
<h3>Registrar Compra</h3>
<select id="produtoCompra" class="input"></select>
<input id="quantidadeCompra" type="number" class="input" placeholder="Qtd">
<select id="moedaCompra" class="input">
<option value="BRL">Real</option>
<option value="USD">Dólar</option>
</select>
<input id="valorCompra" type="number" step="0.01" class="input" placeholder="Valor TOTAL">
<label style="font-size:12px">Cotação</label>
<input id="cotacaoManual" type="number" step="0.01" class="input">
<button class="btn btn-primary" onclick="registrarCompra()">Registrar</button>
</div>
</div>

</div>
</main>
</div>

<img id="tooltip" class="tooltip">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, deleteDoc, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBX6_4pbYSgyT9JDvyqLgfk63yyUbF8AcE",
  authDomain: "skincare-estoque.firebaseapp.com",
  projectId: "skincare-estoque",
  storageBucket: "skincare-estoque.firebasestorage.app",
  messagingSenderId: "853012503411",
  appId: "1:853012503411:web:38a3b7ee12115cc4518306"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let cotacaoAtual = 5.11;

// Cotação automática
fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL")
.then(r=>r.json())
.then(d=>{
  cotacaoAtual = parseFloat(d.USDBRL.bid);
  document.getElementById("dollar-info").innerText =
    "USD: R$ " + cotacaoAtual.toFixed(2);
  document.getElementById("cotacaoManual").value =
    cotacaoAtual.toFixed(2);
});

// Navegação
window.showPage = function(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+id).classList.add("active");
  document.getElementById("pageTitle").innerText =
    id.charAt(0).toUpperCase()+id.slice(1);
};

// Salvar Produto
window.salvarProduto = async function(){
  const nome = document.getElementById("nomeProduto").value.trim();
  const estoque = parseInt(document.getElementById("estoqueProduto").value)||0;
  const minimo = parseInt(document.getElementById("minimoProduto").value)||1;
  const file = document.getElementById("fotoProduto").files[0];

  if(!nome) return alert("Informe o nome");

  let url="";
  if(file){
    const storageRef = ref(storage,"produtos/"+Date.now()+"_"+file.name);
    const snap = await uploadBytes(storageRef,file);
    url = await getDownloadURL(snap.ref);
  }

  await addDoc(collection(db,"produtos"),{
    nome:nome,
    estoque:estoque,
    minimo:minimo,
    foto:url,
    ultimaUSD:0,
    ultimaBRL:0
  });

  alert("Produto salvo!");
};

// Importar com anti-duplicado
window.importarGitHub = async function(){

  const owner="represrogerio";
  const repo="Controle-de-Compras";

  const repoInfo = await (await fetch(
    `https://api.github.com/repos/${owner}/${repo}`
  )).json();

  const branch = repoInfo.default_branch;

  const files = await (await fetch(
    `https://api.github.com/repos/${owner}/${repo}/contents?ref=${branch}`
  )).json();

  const existentes=[];
  const snap = await getDocs(collection(db,"produtos"));
  snap.forEach(d=>{
    existentes.push(d.data().nome.toLowerCase().trim());
  });

  let criados=0;

  for(const f of files){
    if(/\.(png|jpg|jpeg|webp)$/i.test(f.name)){
      const nome = f.name
        .replace(/\.(png|jpg|jpeg|webp)$/i,"")
        .replace(/[_\-\.]+/g," ")
        .trim();

      if(!existentes.includes(nome.toLowerCase())){
        await addDoc(collection(db,"produtos"),{
          nome:nome,
          estoque:0,
          minimo:1,
          foto:f.download_url,
          ultimaUSD:0,
          ultimaBRL:0
        });
        criados++;
      }
    }
  }

  alert("Importados: "+criados);
};

// Listener Produtos
onSnapshot(collection(db,"produtos"), snap=>{
  const tbody=document.getElementById("listaProdutos");
  const sel=document.getElementById("produtoCompra");
  const alerts=document.getElementById("alerts");
  tbody.innerHTML=""; sel.innerHTML=""; alerts.innerHTML="";
  let total=0, baixo=0;

  snap.forEach(d=>{
    const p=d.data();
    const id=d.id;
    total+=p.estoque||0;

    if((p.estoque||0)<=(p.minimo||0)){
      baixo++;
      alerts.innerHTML+=`
      <div class="alert-low"
        onmousemove="showTooltip('${p.foto}',event)"
        onmouseleave="hideTooltip()">
        ⚠ ${p.nome} (${p.estoque}/${p.minimo})
      </div>`;
    }

    tbody.innerHTML+=`
    <tr>
      <td>${p.foto?`<img src="${p.foto}" class="img-thumb">`:"🧴"}</td>
      <td>${p.nome}</td>
      <td>${p.estoque||0}</td>
      <td>${p.minimo||0}</td>
      <td>$ ${(p.ultimaUSD||0).toFixed(2)}</td>
      <td>R$ ${(p.ultimaBRL||0).toFixed(2)}</td>
      <td>
        <button class="btn btn-success" onclick="entrada('${id}')">+ Entrada</button>
        <button class="btn btn-danger" onclick="saida('${id}')">- Saída</button>
      </td>
    </tr>`;

    sel.innerHTML+=`<option value="${id}">${p.nome}</option>`;
  });

  document.getElementById("totalProdutos").innerText=snap.size;
  document.getElementById("totalEstoque").innerText=total;
  document.getElementById("totalBaixo").innerText=baixo;
});

// Entrada/Saída
window.entrada = async function(id){
  const qtd=parseInt(prompt("Qtd entrada:"));
  if(!qtd) return;
  await updateDoc(doc(db,"produtos",id),{estoque:increment(qtd)});
};

window.saida = async function(id){
  const qtd=parseInt(prompt("Qtd saída:"));
  if(!qtd) return;
  await updateDoc(doc(db,"produtos",id),{estoque:increment(-qtd)});
};

// Compra
window.registrarCompra = async function(){
  const id=document.getElementById("produtoCompra").value;
  const qtd=parseInt(document.getElementById("quantidadeCompra").value);
  const total=parseFloat(document.getElementById("valorCompra").value);
  const moeda=document.getElementById("moedaCompra").value;
  const cot=parseFloat(document.getElementById("cotacaoManual").value)||cotacaoAtual;

  if(!id||!qtd||!total) return alert("Preencha tudo");

  const refDoc=doc(db,"produtos",id);
  const snap=await getDoc(refDoc);
  const p=snap.data();

  let totalUSD,totalBRL;

  if(moeda==="USD"){
    totalUSD=total;
    totalBRL=total*cot;
  }else{
    totalBRL=total;
    totalUSD=total/cot;
  }

  await updateDoc(refDoc,{
    estoque:increment(qtd),
    ultimaUSD:(totalUSD/qtd),
    ultimaBRL:(totalBRL/qtd)
  });

  alert("Compra registrada!");
};

// Tooltip
window.showTooltip=function(url,e){
  if(!url) return;
  const t=document.getElementById("tooltip");
  t.innerHTML=`<img src="${url}" style="width:130px;height:130px;object-fit:cover;border-radius:10px">`;
  t.style.display="block";
  t.style.left=(e.pageX+10)+"px";
  t.style.top=(e.pageY+10)+"px";
};

window.hideTooltip=function(){
  document.getElementById("tooltip").style.display="none";
};
</script>

</body>
</html>
