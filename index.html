<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skincare Estoque Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===========================
   VARIABLES
=========================== */
:root{
--bg:#f8fafc;
--surface:#ffffff;
--primary:#ec4899;
--primary-dark:#db2777;
--success:#10b981;
--warning:#f59e0b;
--danger:#ef4444;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--radius:12px;
}

/* ===========================
   BASE
=========================== */
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

h1,h2,h3{font-weight:700}

button{
border:none;
cursor:pointer;
font-family:inherit;
transition:.2s ease;
}

button:hover{
transform:translateY(-2px);
}

/* ===========================
   LAYOUT
=========================== */
.layout{
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:var(--surface);
border-right:1px solid var(--border);
padding:30px 20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
font-size:18px;
margin-bottom:30px;
color:var(--primary-dark);
}

.nav-link{
padding:10px 15px;
border-radius:8px;
margin-bottom:6px;
font-size:14px;
font-weight:500;
color:var(--muted);
}

.nav-link:hover{
background:#fdf2f8;
color:var(--primary-dark);
}

.nav-link.active{
background:var(--primary);
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:var(--surface);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
}

.header-title{
font-size:18px;
font-weight:700;
}

.badge{
background:#fef3c7;
color:#92400e;
padding:6px 14px;
border-radius:999px;
font-size:13px;
font-weight:600;
}

.content{
padding:30px;
}

/* ===========================
   DASHBOARD
=========================== */
.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:var(--radius);
padding:20px;
}

.stat-card span{
display:block;
font-size:12px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:8px;
}

.stat-card strong{
font-size:26px;
font-weight:800;
}

/* ===========================
   ALERTS
=========================== */
.alert{
background:#fff1f2;
border-left:4px solid var(--danger);
padding:12px 15px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
font-weight:600;
}

/* ===========================
   BUTTONS
=========================== */
.btn{
padding:10px 16px;
border-radius:8px;
font-size:14px;
font-weight:600;
}

.btn-primary{background:var(--primary);color:white}
.btn-warning{background:var(--warning);color:white}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}

/* ===========================
   TABLE
=========================== */
.table-container{
background:var(--surface);
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f1f5f9;
font-size:12px;
text-transform:uppercase;
color:var(--muted);
padding:12px;
text-align:left;
}

td{
padding:12px;
border-top:1px solid var(--border);
font-size:14px;
}

tr:hover{
background:#fafafa;
}

.stock-ok{color:#065f46;background:#d1fae5;padding:4px 10px;border-radius:999px;font-size:12px}
.stock-low{color:#92400e;background:#fef3c7;padding:4px 10px;border-radius:999px;font-size:12px}
.stock-crit{color:#991b1c;background:#fee2e2;padding:4px 10px;border-radius:999px;font-size:12px}

.img-thumb{
width:40px;
height:40px;
object-fit:cover;
border-radius:6px;
}

.tooltip{
position:fixed;
display:none;
z-index:9999;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.25);
border:2px solid white;
}

/* ===========================
   RESPONSIVE
=========================== */
@media(max-width:900px){
.layout{flex-direction:column}
.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>🧴 SkincarePro</h2>
<div class="nav-link active">Dashboard</div>
</div>

<div class="main">

<div class="header">
<div class="header-title">Dashboard</div>
<div id="cotacao" class="badge">$ --</div>
</div>

<div class="content">

<!-- STATS -->
<div class="stats-grid">
<div class="stat-card"><span>Produtos</span><strong id="statProds">0</strong></div>
<div class="stat-card"><span>Unidades</span><strong id="statQtd">0</strong></div>
<div class="stat-card"><span>Críticos</span><strong id="statCrit" style="color:var(--danger)">0</strong></div>
<div class="stat-card"><span>Valor $</span><strong id="statUSD">$0</strong></div>
<div class="stat-card"><span>Valor R$</span><strong id="statBRL">R$0</strong></div>
</div>

<div id="alerts"></div>

<div style="display:flex;gap:12px;margin-bottom:20px">
<button class="btn btn-primary" onclick="importarGithub()">Importar GitHub</button>
<button class="btn btn-warning" onclick="limparDuplicados()">Limpar Duplicados</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Produto</th>
<th>Qtd</th>
<th>Mín</th>
<th>$ Custo</th>
<th>R$ Eq</th>
<th>$ Total</th>
<th>R$ Total</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>
</div>
</div>

<img id="tooltip" class="tooltip">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBX6_4pbYSgyT9JDvyqLgfk63yyUbF8AcE",
authDomain: "skincare-estoque.firebaseapp.com",
projectId: "skincare-estoque",
storageBucket: "skincare-estoque.firebasestorage.app",
messagingSenderId: "853012503411",
appId: "1:853012503411:web:38a3b7ee12115cc4518306"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cotacao = 5;

fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL")
.then(r=>r.json())
.then(d=>{
cotacao=parseFloat(d.USDBRL.bid)||5;
document.getElementById("cotacao").innerText="$1 = R$ "+cotacao.toFixed(2);
});

onSnapshot(collection(db,"produtos"),snap=>{
const tbody=document.getElementById("tabela");
const alerts=document.getElementById("alerts");
let totalP=0,totalQ=0,totalCrit=0,totalUSD=0,totalBRL=0;
tbody.innerHTML="";
alerts.innerHTML="";

snap.forEach(d=>{
const p=d.data();
totalP++;
totalQ+=p.estoque||0;
totalUSD+=(p.custoUSD||0)*(p.estoque||0);
totalBRL+=(p.custoBRL||0)*(p.estoque||0);

let badge="stock-ok";
if((p.estoque||0)==0) badge="stock-crit";
else if((p.estoque||0)<= (p.minimo||0)) badge="stock-low";

if((p.estoque||0)<= (p.minimo||0)){
totalCrit++;
alerts.innerHTML+=`<div class="alert">⚠ ${p.nome} crítico (${p.estoque}/${p.minimo})</div>`;
}

tbody.innerHTML+=`
<tr>
<td>${p.foto?`<img src="${p.foto}" class="img-thumb" onmouseover="showImg('${p.foto}',event)" onmouseout="hideImg()">`:""}</td>
<td>${p.nome}</td>
<td><span class="${badge}">${p.estoque||0}</span></td>
<td>${p.minimo||0}</td>
<td>$ ${(p.custoUSD||0).toFixed(2)}</td>
<td>R$ ${(p.custoBRL||0).toFixed(2)}</td>
<td>$ ${((p.custoUSD||0)*(p.estoque||0)).toFixed(2)}</td>
<td>R$ ${((p.custoBRL||0)*(p.estoque||0)).toFixed(2)}</td>
</tr>`;
});

document.getElementById("statProds").innerText=totalP;
document.getElementById("statQtd").innerText=totalQ;
document.getElementById("statCrit").innerText=totalCrit;
document.getElementById("statUSD").innerText="$"+totalUSD.toFixed(2);
document.getElementById("statBRL").innerText="R$"+totalBRL.toFixed(2);
});

window.showImg=(url,e)=>{
const t=document.getElementById("tooltip");
t.src=url;
t.style.display="block";
t.style.left=e.pageX+15+"px";
t.style.top=e.pageY+15+"px";
};

window.hideImg=()=>{
document.getElementById("tooltip").style.display="none";
};

window.importarGithub=async()=>{
const owner="represrogerio",repo="Controle-de-Compras";
const ri=await fetch(`https://api.github.com/repos/${owner}/${repo}`).then(r=>r.json());
const branch=ri.default_branch;
const files=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents?ref=${branch}`).then(r=>r.json());
const existentes=[];
(await getDocs(collection(db,"produtos"))).forEach(d=>existentes.push(d.data().nome.toLowerCase()));
let criados=0;
for(const f of files){
if(/\.(png|jpg|jpeg|webp)$/i.test(f.name)){
let n=f.name.replace(/\.(png|jpg|jpeg|webp)$/i,"").replace(/[_\-\.]+/g," ").trim();
if(!existentes.includes(n.toLowerCase())){
await addDoc(collection(db,"produtos"),{
nome:n,
estoque:0,
minimo:1,
foto:f.download_url,
custoUSD:0,
custoBRL:0
});
criados++;
}
}
}
alert("Novos criados: "+criados);
};

window.limparDuplicados=async()=>{
const mapa={},ids=[];
(await getDocs(collection(db,"produtos"))).forEach(d=>{
const n=d.data().nome.toLowerCase();
if(mapa[n]) ids.push(d.id); else mapa[n]=true;
});
for(const id of ids) await deleteDoc(doc(db,"produtos",id));
alert("Removidos: "+ids.length);
};
</script>

</body>
</html>
